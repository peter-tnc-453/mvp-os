<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MVP OS — Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1600px;
    height: 400px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #0a0a0b;
    color: #f2f2f0;
    position: relative;
    overflow: hidden;
  }

  /* subtle dot grid texture */
  .grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.12;
  }

  /* faint amber glow, upper-left */
  .glow {
    position: absolute;
    top: -220px;
    left: -160px;
    width: 620px;
    height: 620px;
    background: radial-gradient(circle, rgba(232,150,90,0.16) 0%, rgba(232,150,90,0) 70%);
  }

  .frame {
    position: relative;
    width: 1600px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 140px;
    padding: 0 64px;
  }

  .divider {
    width: 1px;
    height: 220px;
    background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.12), rgba(255,255,255,0));
    flex: none;
  }

  /* ---------- LEFT: identity ---------- */
  .left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 22px;
    max-width: 860px;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #E8965A;
    flex: none;
  }

  .name {
    font-size: 46px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fbfbfa;
    white-space: nowrap;
  }

  .tagline {
    font-size: 20px;
    font-weight: 400;
    line-height: 1.5;
    color: #9a9a97;
    max-width: 620px;
  }

  .tagline b {
    color: #cfcfcb;
    font-weight: 500;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    padding: 9px 18px;
    border: 1px solid rgba(232,150,90,0.45);
    border-radius: 6px;
    background: rgba(232,150,90,0.06);
  }

  .pill .prompt {
    color: #E8965A;
    font-family: "SF Mono", ui-monospace, "Menlo", monospace;
    font-size: 15px;
  }

  .pill .cmd {
    color: #e9e9e6;
    font-family: "SF Mono", ui-monospace, "Menlo", monospace;
    font-size: 15px;
  }

  /* ---------- RIGHT: pipeline ---------- */
  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    flex: none;
  }

  .pipeline-label {
    font-family: "SF Mono", ui-monospace, "Menlo", monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #5f5f5c;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .step {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 168px;
    padding: 7px 0;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 5px;
    background: rgba(255,255,255,0.03);
    font-family: "SF Mono", ui-monospace, "Menlo", monospace;
    font-size: 12.5px;
    letter-spacing: 0.6px;
    color: #d4d4d1;
    text-transform: uppercase;
  }

  .connector {
    width: 1px;
    height: 14px;
    background: linear-gradient(180deg, rgba(232,150,90,0.65), rgba(232,150,90,0.15));
  }

</style>
</head>
<body>

  <div class="grid"></div>
  <div class="glow"></div>

  <div class="frame">

    <div class="left">
      <div class="wordmark">
        <span class="dot"></span>
        <span class="name">MVP OS</span>
      </div>
      <div class="tagline">
        An <b>AI Product Operating System</b> for building MVPs with Claude Code
      </div>
      <div class="pill">
        <span class="prompt">$</span>
        <span class="cmd">claude</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="right">
      <div class="pipeline-label">the pipeline</div>
      <div class="step">Idea</div>
      <div class="connector"></div>
      <div class="step">Research</div>
      <div class="connector"></div>
      <div class="step">PRD</div>
      <div class="connector"></div>
      <div class="step">Roadmap</div>
      <div class="connector"></div>
      <div class="step">UI</div>
      <div class="connector"></div>
      <div class="step">Build</div>
      <div class="connector"></div>
      <div class="step">Debug</div>
      <div class="connector"></div>
      <div class="step">Deploy</div>
    </div>

  </div>

</body>
</html>
